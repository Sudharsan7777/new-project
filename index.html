<!DOCTYPE html>
<html>

<head>
    <title>javascript counter</title>
    <!-- CSS only -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">

        <div class="row justify-content-center" >
            <div class="col-md-6 text-center">
                <h1>javascript counter</h1>
                <h1 id="number">0</h1>
                <button class="btn btn-success" onclick="increment()">INCREMENT</button>
                <button class="btn btn-danger" onclick="decrement()">DECREMENT</button>
                <button class="btn btn-primary" onclick="neutral()">NEUTRAL</button></br>
                <button class="btn btn-success" onclick="mby2()">I BY 2</button>
                <button class="btn btn-danger" onclick="mby3()">I BY 3</button>
                <button class="btn btn-primary" onclick="mby4()">I BY 4</button>


            </div>
        </div>
    </div>
</body>

</html>
<script src="./index.js"></script>
